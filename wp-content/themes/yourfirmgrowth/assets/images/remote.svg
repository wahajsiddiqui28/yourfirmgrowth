  </g>
  <g fill="#0aa3b0">
    <circle cx="150" cy="330" r="24"/><path d="M120 384 a30 30 0 0 1 60 0Z"/>
  </g>
  <g fill="#0aa3b0">
    <circle cx="410" cy="330" r="24"/><path d="M380 384 a30 30 0 0 1 60 0Z"/>
  </g>
  <!-- connection lines -->
