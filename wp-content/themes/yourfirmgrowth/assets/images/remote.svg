<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 440" role="img" aria-label="Dedicated remote team">
  <defs>
    <linearGradient id="gr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#052f57"/>
      <stop offset="1" stop-color="#04707d"/>
