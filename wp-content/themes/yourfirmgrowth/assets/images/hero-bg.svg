<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Abstract business growth background">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#041a30"/>
      <stop offset="48%" stop-color="#052f57"/>
      <stop offset="100%" stop-color="#04707d"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#0aa3b0" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#0aa3b0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#0a3f6e" stop-opacity=".6"/>
      <stop offset="100%" stop-color="#0a3f6e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0aa3b0" stop-opacity=".0"/>
      <stop offset="100%" stop-color="#0aa3b0" stop-opacity=".5"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#base)"/>

  <circle cx="1320" cy="120" r="520" fill="url(#glow1)"/>
  <circle cx="120" cy="820" r="460" fill="url(#glow2)"/>

  <!-- dot grid texture -->
  <g fill="#ffffff" opacity=".06">
    <g id="row">
      <circle cx="60" cy="60" r="3"/><circle cx="140" cy="60" r="3"/><circle cx="220" cy="60" r="3"/><circle cx="300" cy="60" r="3"/><circle cx="380" cy="60" r="3"/><circle cx="460" cy="60" r="3"/><circle cx="540" cy="60" r="3"/>
    </g>
    <use href="#row" y="80"/><use href="#row" y="160"/><use href="#row" y="240"/><use href="#row" y="320"/>
  </g>

  <!-- network constellation -->
  <g stroke="#9fe1cb" stroke-width="1.5" opacity=".35" fill="none">
    <path d="M1080 180 L1230 120 L1360 220 L1300 360 L1150 320 Z"/>
    <path d="M1230 120 L1300 360"/>
    <path d="M1080 180 L1300 360"/>
  </g>
  <g fill="#9fe1cb" opacity=".75">
    <circle cx="1080" cy="180" r="6"/><circle cx="1230" cy="120" r="8"/><circle cx="1360" cy="220" r="6"/><circle cx="1300" cy="360" r="7"/><circle cx="1150" cy="320" r="5"/>
  </g>

  <!-- growth bars + arrow -->
  <g opacity=".9">
    <rect x="1010" y="560" width="44" height="120" rx="8" fill="#ffffff" opacity=".12"/>
    <rect x="1075" y="510" width="44" height="170" rx="8" fill="#ffffff" opacity=".18"/>
    <rect x="1140" y="450" width="44" height="230" rx="8" fill="#0aa3b0" opacity=".55"/>
    <rect x="1205" y="380" width="44" height="300" rx="8" fill="#5dcaa5" opacity=".7"/>
    <rect x="1270" y="300" width="44" height="380" rx="8" fill="#9fe1cb" opacity=".85"/>
    <path d="M1020 600 C1120 560 1200 470 1320 330" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity=".85"/>
    <path d="M1296 322 L1338 312 L1322 352 Z" fill="#ffffff" opacity=".95"/>
  </g>

  <!-- concentric rings -->
  <g stroke="#ffffff" fill="none" opacity=".08">
    <circle cx="180" cy="760" r="90"/><circle cx="180" cy="760" r="150"/><circle cx="180" cy="760" r="210"/>
  </g>

  <!-- layered waves bottom -->
  <path d="M0 760 C 300 690, 540 840, 820 770 C 1120 695, 1340 820, 1600 740 L1600 900 L0 900 Z" fill="#04707d" opacity=".35"/>
  <path d="M0 820 C 320 760, 560 880, 860 820 C 1160 760, 1380 870, 1600 800 L1600 900 L0 900 Z" fill="#052f57" opacity=".55"/>
  <path d="M0 870 C 360 830, 600 910, 900 870 C 1200 830, 1420 905, 1600 865 L1600 900 L0 900 Z" fill="#031526" opacity=".7"/>
</svg>
